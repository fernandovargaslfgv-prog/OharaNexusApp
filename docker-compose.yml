version: '3.8'

services:
  ohara-nexus:
    build: .
    container_name: ohara-nexus-app
    hostname: ohara-nexus
    ports:
      - "3001:3000"
    volumes:
      # 1. Tus Mangas: La izquierda es tu carpeta real, la derecha es interna
      - /home/luis/mangas/General/mangas:/app/mangas_data

      # 2. La Base de Datos: CRÍTICO para no perder favoritos/historial
      - ./nexus.db:/app/nexus.db

      # 3. Cache de portadas (por si acaso las guardas como archivos)
      - ./cover_cache:/app/cover_cache

    environment:
      - NODE_ENV=production
      - MANGA_PATH=/app/mangas_data
      - TZ=Europe/Madrid
    restart: always
